name: CI/CD

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    name: Build & Test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Cache API node_modules
        id: cache-api
        uses: actions/cache@v4
        with:
          path: api/node_modules
          key: api-${{ runner.os }}-${{ hashFiles('api/package-lock.json') }}

      - name: Cache frontend node_modules
        id: cache-frontend
        uses: actions/cache@v4
        with:
          path: frontend/node_modules
          key: frontend-${{ runner.os }}-${{ hashFiles('frontend/package-lock.json') }}

      - name: Install API dependencies
        if: steps.cache-api.outputs.cache-hit != 'true'
        run: npm ci
        working-directory: api

      - name: Run API tests
        run: npm test
        working-directory: api

      - name: Install frontend dependencies
        if: steps.cache-frontend.outputs.cache-hit != 'true'
        run: npm ci
        working-directory: frontend

      - name: Run frontend tests
        run: npm test
        working-directory: frontend

      - name: Build frontend
        run: npm run build
        working-directory: frontend

      - name: Upload frontend build artifact
        uses: actions/upload-artifact@v4
        with:
          name: frontend-dist
          path: frontend/dist

  codeql:
    name: CodeQL Analysis
    runs-on: ubuntu-latest
    needs: test
    permissions:
      security-events: write
      actions: read
      contents: read

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Initialize CodeQL
        uses: github/codeql-action/init@v3
        with:
          languages: javascript

      - name: Perform CodeQL Analysis
        uses: github/codeql-action/analyze@v3

  publish-docs:
    name: Publish API Docs to GitHub Pages
    runs-on: ubuntu-latest
    needs: test
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    permissions:
      contents: read
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deploy.outputs.page_url }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 2

      - name: Check if api/ changed
        id: api-changed
        run: |
          if ! git rev-parse HEAD^ >/dev/null 2>&1 || git diff --name-only HEAD^ HEAD | grep -q '^api/'; then
            echo "changed=true" >> $GITHUB_OUTPUT
          else
            echo "changed=false" >> $GITHUB_OUTPUT
          fi

      - name: Set up Node.js
        if: steps.api-changed.outputs.changed == 'true'
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Restore API node_modules cache
        if: steps.api-changed.outputs.changed == 'true'
        uses: actions/cache@v4
        with:
          path: api/node_modules
          key: api-${{ runner.os }}-${{ hashFiles('api/package-lock.json') }}

      - name: Install API dependencies
        if: steps.api-changed.outputs.changed == 'true'
        run: npm ci
        working-directory: api

      - name: Generate openapi.json
        if: steps.api-changed.outputs.changed == 'true'
        run: npm run generate-openapi
        working-directory: api

      - name: Assemble docs site
        if: steps.api-changed.outputs.changed == 'true'
        run: |
          mkdir -p _site
          cp docs/index.html _site/index.html
          cp api/openapi.json _site/openapi.json

      - name: Configure GitHub Pages
        if: steps.api-changed.outputs.changed == 'true'
        uses: actions/configure-pages@v5

      - name: Upload pages artifact
        if: steps.api-changed.outputs.changed == 'true'
        uses: actions/upload-pages-artifact@v3
        with:
          path: _site

      - name: Deploy to GitHub Pages
        if: steps.api-changed.outputs.changed == 'true'
        id: deploy
        uses: actions/deploy-pages@v4

  deploy-backend:
    name: Deploy Backend to Render
    runs-on: ubuntu-latest
    needs: test
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'

    steps:
      - name: Trigger Render deploy hook
        run: curl -fsSL -X POST "${{ secrets.RENDER_DEPLOY_HOOK_URL }}"

  deploy-frontend:
    name: Deploy Frontend to Netlify
    runs-on: ubuntu-latest
    needs: test
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'

    steps:
      - name: Download frontend build artifact
        uses: actions/download-artifact@v4
        with:
          name: frontend-dist
          path: frontend/dist

      - name: Deploy to Netlify
        uses: nwtgck/actions-netlify@v3
        with:
          publish-dir: frontend/dist
          production-deploy: true
        env:
          NETLIFY_AUTH_TOKEN: ${{ secrets.NETLIFY_AUTH_TOKEN }}
          NETLIFY_SITE_ID: ${{ secrets.NETLIFY_SITE_ID }}
